<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>标点符号练习 — 0624</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
:root {
  --bg: #f0f2f5;
  --surface: #fff;
  --text: #1a1a2e;
  --text-secondary: #555;
  --primary: #4f6ef7;
  --primary-hover: #3b54e0;
  --danger: #e74c3c;
  --danger-hover: #c0392b;
  --border: #dce0e6;
  --shadow: 0 2px 8px rgba(0,0,0,.08);
  --radius: 10px;
  --toolbar-height: 64px;
  --transition: 0.2s ease;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  user-select: none;
  -webkit-user-select: none;
}

/* ── TOOLBAR ── */
#toolbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
  height: var(--toolbar-height);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
  padding: 0 16px;
  box-shadow: var(--shadow);
}
#toolbar .brand {
  font-weight: 700; font-size: 1.1rem; color: var(--primary);
  white-space: nowrap; margin-right: 6px;
}
#toolbar .sep {
  width: 1px; height: 28px; background: var(--border); margin: 0 4px;
}

/* toolbar buttons */
.tool-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 14px; border-radius: 8px; border: 1.5px solid var(--border);
  background: var(--surface); color: var(--text); cursor: pointer;
  font-size: 0.9rem; font-weight: 500; transition: all var(--transition);
  white-space: nowrap;
}
.tool-btn svg { width: 18px; height: 18px; flex-shrink: 0; }
.tool-btn:hover { background: #f5f6fa; border-color: #c4c9d4; }
.tool-btn.active {
  background: var(--primary); color: #fff; border-color: var(--primary);
}
.tool-btn.active svg { stroke: #fff; }

/* page nav */
#page-info {
  font-size: 0.9rem; color: var(--text-secondary); min-width: 80px; text-align: center;
}

/* input groups */
.tool-group { display: flex; align-items: center; gap: 6px; }
.tool-group label { font-size: 0.8rem; color: var(--text-secondary); white-space: nowrap; }
#colorPicker { width: 32px; height: 32px; border: 2px solid var(--border); border-radius: 6px; cursor: pointer; padding: 2px; }
#lineWidth { width: 60px; accent-color: var(--primary); }

/* ── MAIN CONTENT ── */
#main {
  margin-top: var(--toolbar-height);
  padding: 20px;
  display: flex; flex-direction: column; align-items: center; gap: 20px;
}

/* file drop zone */
#dropZone {
  border: 3px dashed #c4c9d4; border-radius: 16px;
  padding: 60px 40px; text-align: center; max-width: 600px;
  transition: all var(--transition); cursor: pointer;
}
#dropZone:hover, #dropZone.dragover {
  border-color: var(--primary); background: rgba(79,110,247,0.04);
}
#dropZone .icon { font-size: 3rem; margin-bottom: 12px; }
#dropZone h2 { font-size: 1.2rem; margin-bottom: 6px; color: var(--text); }
#dropZone p { font-size: 0.9rem; color: var(--text-secondary); }
#dropZone input { display: none; }

/* page container */
.page-wrapper {
  position: relative;
  margin-bottom: 20px;
  box-shadow: 0 4px 20px rgba(0,0,0,.1);
  border-radius: 6px;
  overflow: hidden;
  background: #fff;
  line-height: 0;
}
.page-wrapper canvas { display: block; }
.page-wrapper .draw-canvas {
  position: absolute; top: 0; left: 0;
  cursor: crosshair;
}

/* loading */
#loading {
  display: none; flex-direction: column; align-items: center; gap: 12px;
  padding: 40px;
}
#loading.show { display: flex; }
.spinner {
  width: 40px; height: 40px; border: 4px solid var(--border);
  border-top-color: var(--primary); border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
#progress { font-size: 0.9rem; color: var(--text-secondary); }

/* flash message */
#toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: #1a1a2e; color: #fff; padding: 10px 24px; border-radius: 20px;
  font-size: 0.9rem; opacity: 0; pointer-events: none;
  transition: opacity 0.3s ease; z-index: 2000;
}
#toast.show { opacity: 1; }

/* responsiveness */
@media (max-width: 768px) {
  #toolbar { flex-wrap: wrap; height: auto; padding: 10px 12px; gap: 6px; }
  #main { margin-top: 120px; }
  .tool-btn { padding: 6px 10px; font-size: 0.8rem; }
  #toolbar .brand { font-size: 0.95rem; }
}
</style>
</head>
<body>

<!-- ── TOOLBAR ── -->
<div id="toolbar">
  <span class="brand">📝 标点符号练习</span>
  <span class="sep"></span>

  <button class="tool-btn active" id="btnPen" title="手写笔 (P)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
    </svg>
    手写笔
  </button>

  <button class="tool-btn" id="btnEraser" title="橡皮擦 (E)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M20 20H7L3 16c-.8-.8-.8-2 0-2.8L14.6 1.6c.8-.8 2-.8 2.8 0L21 5.2c.8.8.8 2 0 2.8L12 17"/>
      <line x1="6" y1="20" x2="6" y2="17"/>
    </svg>
    橡皮擦
  </button>

  <span class="sep"></span>

  <div class="tool-group">
    <label for="colorPicker">颜色</label>
    <input type="color" id="colorPicker" value="#ff3333" title="笔触颜色">
  </div>
  <div class="tool-group">
    <label for="lineWidth">粗细</label>
    <input type="range" id="lineWidth" min="1" max="12" value="3" title="笔触粗细">
  </div>

  <span class="sep"></span>

  <button class="tool-btn" id="btnUndo" title="撤销 (Ctrl+Z)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="1 4 1 10 7 10"/><path d="M3.5 22A9.5 9.5 0 1 1 17 5"/>
    </svg>
    撤销
  </button>
  <button class="tool-btn" id="btnClear" title="清除当前页标注">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
    </svg>
    清除本页
  </button>

  <span class="sep"></span>

  <button class="tool-btn" id="btnPrev" title="上一页 (←)">◀</button>
  <span id="page-info">— / —</span>
  <button class="tool-btn" id="btnNext" title="下一页 (→)">▶</button>

  <span class="sep"></span>

  <button class="tool-btn" id="btnSave" title="保存标注">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
      <polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>
    </svg>
    导出
  </button>
</div>

<!-- ── MAIN ── -->
<div id="main">
  <div id="dropZone">
    <div class="icon">📄</div>
    <h2>打开 PDF 文件</h2>
    <p>拖放文件到此处，或点击选择<br><small>标点符号0624.pdf</small></p>
    <input type="file" id="fileInput" accept=".pdf">
  </div>
  <div id="loading">
    <div class="spinner"></div>
    <div id="progress">正在加载 PDF…</div>
  </div>
  <div id="pagesContainer"></div>
</div>

<div id="toast"></div>

<script>
// ──────────── pdf.js worker ────────────
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ──────────── STATE ────────────
let pdfDoc = null;
let currentPage = 1;
let totalPages = 0;
let scale = 1.5;
let tool = 'pen';   // 'pen' | 'eraser'
let penColor = '#ff3333';
let lineWidth = 3;

// Per-page annotation stacks — each entry is an array of strokes
// stroke = { points: [{x,y},...], color, width }
let pageAnnotations = {};    // { pageNum: [strokes] }
let undoStacks = {};         // { pageNum: [strokes] } — popped for undo

// Current drawing state
let isDrawing = false;
let currentStroke = null;
let currentCanvas = null;
let currentCtx = null;

// Store refs to draw-canvas elements per page
let drawCanvases = {};       // { pageNum: canvas }

// ──────────── DOM REFS ────────────
const $dropZone  = document.getElementById('dropZone');
const $fileInput = document.getElementById('fileInput');
const $loading   = document.getElementById('loading');
const $progress  = document.getElementById('progress');
const $pagesCont = document.getElementById('pagesContainer');
const $pageInfo  = document.getElementById('page-info');
const $toast     = document.getElementById('toast');

const $btnPen    = document.getElementById('btnPen');
const $btnEraser = document.getElementById('btnEraser');
const $colorPick = document.getElementById('colorPicker');
const $lineW     = document.getElementById('lineWidth');

// ──────────── TOAST ────────────
let toastTimer;
function toast(msg) {
  $toast.textContent = msg; $toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => $toast.classList.remove('show'), 1800);
}

// ──────────── FILE INPUT ────────────
$dropZone.addEventListener('click', () => $fileInput.click());
$dropZone.addEventListener('dragover', e => { e.preventDefault(); $dropZone.classList.add('dragover'); });
$dropZone.addEventListener('dragleave', () => $dropZone.classList.remove('dragover'));
$dropZone.addEventListener('drop', e => {
  e.preventDefault(); $dropZone.classList.remove('dragover');
  const f = e.dataTransfer.files[0];
  if (f && f.type === 'application/pdf') loadPDF(f);
});
$fileInput.addEventListener('change', () => {
  const f = $fileInput.files[0];
  if (f) loadPDF(f);
});

// ──────────── LOAD PDF ────────────
async function loadPDF(file) {
  $dropZone.style.display = 'none';
  $loading.classList.add('show');
  $progress.textContent = '正在解析 PDF…';

  const arrayBuffer = await file.arrayBuffer();
  pdfDoc = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
  totalPages = pdfDoc.numPages;
  currentPage = 1;

  // Init annotation storage
  pageAnnotations = {}; undoStacks = {}; drawCanvases = {};
  for (let i = 1; i <= totalPages; i++) {
    pageAnnotations[i] = [];
    undoStacks[i] = [];
  }

  $loading.classList.remove('show');
  $pageInfo.textContent = `1 / ${totalPages}`;
  toast(`已加载: ${file.name || '标点符号0624.pdf'} (${totalPages} 页)`);

  // Pre-create wrappers (lazy render via IntersectionObserver)
  $pagesCont.innerHTML = '';
  drawCanvases = {};
  renderedPages = new Set();

  for (let i = 1; i <= totalPages; i++) {
    const wrapper = document.createElement('div');
    wrapper.className = 'page-wrapper';
    wrapper.dataset.page = i;
    wrapper.id = 'page-' + i;
    wrapper.style.minHeight = '300px'; // placeholder while loading
    wrapper.style.display = 'flex';
    wrapper.style.alignItems = 'center';
    wrapper.style.justifyContent = 'center';
    wrapper.style.color = '#aaa';
    wrapper.style.fontSize = '0.9rem';
    wrapper.textContent = `第 ${i} 页 — 滚动到此处加载…`;
    $pagesCont.appendChild(wrapper);
  }

  // Lazy-render pages as they scroll into view
  setupLazyRender();
  updateToolUI();
}

// ──────────── LAZY PAGE RENDERING ────────────
let renderedPages = new Set();
let renderQueue = [];
let isRendering = false;
let lazyObserver = null;
let scrollObserver = null;

function setupLazyRender() {
  // Clean up previous observers
  if (lazyObserver) lazyObserver.disconnect();
  if (scrollObserver) scrollObserver.disconnect();

  const wrappers = document.querySelectorAll('.page-wrapper');

  // Lazy render observer — render pages as they approach viewport
  lazyObserver = new IntersectionObserver((entries) => {
    for (const entry of entries) {
      if (entry.isIntersecting) {
        const pageNum = parseInt(entry.target.dataset.page);
        if (!renderedPages.has(pageNum) && !renderQueue.includes(pageNum)) {
          renderQueue.push(pageNum);
        }
      }
    }
    processRenderQueue();
  }, { rootMargin: '600px 0px' });

  wrappers.forEach(w => lazyObserver.observe(w));

  // Scroll tracking observer — update current page indicator
  scrollObserver = new IntersectionObserver(entries => {
    let best = null, bestRatio = 0;
    entries.forEach(e => {
      if (e.intersectionRatio > bestRatio) {
        bestRatio = e.intersectionRatio;
        best = e.target;
      }
    });
    if (best && bestRatio > 0.3) {
      const p = parseInt(best.dataset.page);
      if (!isNaN(p)) {
        currentPage = p;
        $pageInfo.textContent = `${currentPage} / ${totalPages}`;
      }
    }
  }, { threshold: [0, 0.3, 0.5, 0.7, 1] });

  wrappers.forEach(w => scrollObserver.observe(w));
}

async function processRenderQueue() {
  if (isRendering || renderQueue.length === 0) return;
  isRendering = true;

  // Sort so visible pages render first
  renderQueue.sort((a, b) => Math.abs(a - currentPage) - Math.abs(b - currentPage));

  while (renderQueue.length > 0) {
    const pageNum = renderQueue.shift();
    if (renderedPages.has(pageNum)) continue;
    await renderSinglePage(pageNum);
  }

  isRendering = false;
}

async function renderSinglePage(pageNum) {
  const wrapper = document.getElementById('page-' + pageNum);
  if (!wrapper || renderedPages.has(pageNum)) return;

  try {
    const page = await pdfDoc.getPage(pageNum);
    const viewport = page.getViewport({ scale });

    wrapper.innerHTML = '';
    wrapper.style.width = viewport.width + 'px';
    wrapper.style.height = viewport.height + 'px';
    wrapper.style.minHeight = 'auto';
    wrapper.style.display = 'block';
    wrapper.style.color = '';
    wrapper.style.fontSize = '';
    wrapper.style.boxShadow = '0 4px 20px rgba(0,0,0,.1)';
    wrapper.style.borderRadius = '6px';
    wrapper.style.overflow = 'hidden';
    wrapper.style.background = '#fff';
    wrapper.style.lineHeight = '0';
    wrapper.style.marginBottom = '20px';

    // PDF render canvas
    const pdfCanvas = document.createElement('canvas');
    pdfCanvas.width = viewport.width;
    pdfCanvas.height = viewport.height;
    const pdfCtx = pdfCanvas.getContext('2d');
    await page.render({ canvasContext: pdfCtx, viewport }).promise;
    wrapper.appendChild(pdfCanvas);

    // Drawing canvas
    const drawCanvas = document.createElement('canvas');
    drawCanvas.className = 'draw-canvas';
    drawCanvas.width = viewport.width;
    drawCanvas.height = viewport.height;
    drawCanvas.dataset.page = pageNum;
    drawCanvas.style.position = 'absolute';
    drawCanvas.style.top = '0';
    drawCanvas.style.left = '0';
    drawCanvas.style.cursor = tool === 'eraser' ? 'cell' : 'crosshair';
    wrapper.style.position = 'relative';
    wrapper.appendChild(drawCanvas);

    drawCanvases[pageNum] = drawCanvas;
    attachDrawEvents(drawCanvas, pageNum);
    renderedPages.add(pageNum);

    // Redraw existing annotations
    redrawPageAnnotations(pageNum);

  } catch (err) {
    console.error(`渲染第 ${pageNum} 页失败:`, err);
    wrapper.textContent = `第 ${pageNum} 页加载失败`;
  }
}

// Render a specific page immediately (for page navigation)
async function ensurePageRendered(pageNum) {
  if (!renderedPages.has(pageNum)) {
    await renderSinglePage(pageNum);
  }
  scrollToPage(pageNum);
}

// ──────────── DRAWING EVENTS ────────────
function attachDrawEvents(canvas, pageNum) {
  const getPos = (e) => {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (e.clientX - rect.left) * (canvas.width / rect.width),
      y: (e.clientY - rect.top)  * (canvas.height / rect.height)
    };
  };

  // Mouse
  canvas.addEventListener('mousedown', e => {
    if (tool !== 'pen' && tool !== 'eraser') return;
    startStroke(pageNum, getPos(e));
  });
  canvas.addEventListener('mousemove', e => {
    if (!isDrawing) return;
    continueStroke(pageNum, getPos(e));
  });
  canvas.addEventListener('mouseup', () => endStroke(pageNum));
  canvas.addEventListener('mouseleave', () => { if (isDrawing) endStroke(pageNum); });

  // Touch
  canvas.addEventListener('touchstart', e => {
    if (tool !== 'pen' && tool !== 'eraser') return;
    e.preventDefault();
    startStroke(pageNum, getPos(e.touches[0]));
  }, { passive: false });
  canvas.addEventListener('touchmove', e => {
    if (!isDrawing) return;
    e.preventDefault();
    continueStroke(pageNum, getPos(e.touches[0]));
  }, { passive: false });
  canvas.addEventListener('touchend', e => {
    e.preventDefault();
    endStroke(pageNum);
  });
}

function startStroke(pageNum, pos) {
  isDrawing = true;
  currentStroke = {
    points: [pos],
    color: tool === 'eraser' ? '#FFFFFF' : penColor,
    width: tool === 'eraser' ? lineWidth * 3 : lineWidth,
    isEraser: tool === 'eraser'
  };
  currentCanvas = drawCanvases[pageNum];
  currentCtx = currentCanvas.getContext('2d');
}

function continueStroke(pageNum, pos) {
  if (!currentStroke || !currentCtx) return;
  currentStroke.points.push(pos);

  const pts = currentStroke.points;
  if (pts.length < 2) return;

  const ctx = currentCtx;
  ctx.save();

  if (currentStroke.isEraser) {
    // Eraser: draw with destination-out composite to erase
    ctx.globalCompositeOperation = 'destination-out';
    ctx.strokeStyle = 'rgba(0,0,0,1)';
  } else {
    ctx.globalCompositeOperation = 'source-over';
    ctx.strokeStyle = currentStroke.color;
  }

  ctx.lineWidth = currentStroke.width;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.beginPath();
  ctx.moveTo(pts[pts.length - 2].x, pts[pts.length - 2].y);
  ctx.lineTo(pts[pts.length - 1].x, pts[pts.length - 1].y);
  ctx.stroke();
  ctx.restore();
}

function endStroke(pageNum) {
  if (!isDrawing) return;
  isDrawing = false;
  if (currentStroke && currentStroke.points.length > 0) {
    // Add to page annotations
    pageAnnotations[pageNum].push(currentStroke);
    // Clear undo stack for this page (new action)
    undoStacks[pageNum] = [];
  }
  currentStroke = null;
  currentCanvas = null;
  currentCtx = null;
}

// ──────────── REDRAW ────────────
function redrawPageAnnotations(pageNum) {
  const canvas = drawCanvases[pageNum];
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const strokes = pageAnnotations[pageNum] || [];
  for (const s of strokes) {
    ctx.save();
    if (s.isEraser) {
      ctx.globalCompositeOperation = 'destination-out';
      ctx.strokeStyle = 'rgba(0,0,0,1)';
    } else {
      ctx.globalCompositeOperation = 'source-over';
      ctx.strokeStyle = s.color;
    }
    ctx.lineWidth = s.width;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    for (let i = 0; i < s.points.length; i++) {
      if (i === 0) ctx.moveTo(s.points[i].x, s.points[i].y);
      else ctx.lineTo(s.points[i].x, s.points[i].y);
    }
    ctx.stroke();
    ctx.restore();
  }
}

// ──────────── UNDO ────────────
function undoLastStroke(pageNum) {
  const strokes = pageAnnotations[pageNum];
  if (!strokes || strokes.length === 0) return;
  const removed = strokes.pop();
  undoStacks[pageNum].push(removed);
  redrawPageAnnotations(pageNum);
}

// ──────────── CLEAR PAGE ────────────
function clearPage(pageNum) {
  if (!pageAnnotations[pageNum] || pageAnnotations[pageNum].length === 0) {
    toast('本页没有标注');
    return;
  }
  pageAnnotations[pageNum] = [];
  undoStacks[pageNum] = [];
  redrawPageAnnotations(pageNum);
  toast(`已清除第 ${pageNum} 页标注`);
}

// ──────────── TOOL SELECTION ────────────
function setTool(t) {
  tool = t;
  updateToolUI();
}

function updateToolUI() {
  $btnPen.classList.toggle('active', tool === 'pen');
  $btnEraser.classList.toggle('active', tool === 'eraser');

  // Update cursor on all draw canvases
  Object.values(drawCanvases).forEach(c => {
    c.style.cursor = tool === 'eraser' ? 'cell' : 'crosshair';
  });
}

$btnPen.addEventListener('click', () => setTool('pen'));
$btnEraser.addEventListener('click', () => setTool('eraser'));
$colorPick.addEventListener('input', () => { penColor = $colorPick.value; });
$lineW.addEventListener('input', () => { lineWidth = parseInt($lineW.value); });

// ──────────── KEYBOARD SHORTCUTS ────────────
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  switch (e.key.toLowerCase()) {
    case 'p': setTool('pen'); toast('手写笔模式'); break;
    case 'e': setTool('eraser'); toast('橡皮擦模式'); break;
    case 'arrowleft':  e.preventDefault(); (async () => await prevPage())(); break;
    case 'arrowright': e.preventDefault(); (async () => await nextPage())(); break;
    case 'z':
      if (e.ctrlKey || e.metaKey) { e.preventDefault(); undoLastStroke(currentPage); toast('撤销'); }
      break;
    case 'delete':
      if (e.shiftKey) { e.preventDefault(); clearPage(currentPage); }
      break;
  }
});

// ──────────── PAGE NAVIGATION ────────────
function scrollToPage(num) {
  const wrapper = document.getElementById('page-' + num);
  if (wrapper) {
    wrapper.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

async function prevPage() {
  if (currentPage > 1) {
    currentPage--;
    updatePageInfo();
    await ensurePageRendered(currentPage);
  }
}
async function nextPage() {
  if (currentPage < totalPages) {
    currentPage++;
    updatePageInfo();
    await ensurePageRendered(currentPage);
  }
}
function updatePageInfo() {
  $pageInfo.textContent = `${currentPage} / ${totalPages}`;
}

document.getElementById('btnPrev').addEventListener('click', prevPage);
document.getElementById('btnNext').addEventListener('click', nextPage);
document.getElementById('btnUndo').addEventListener('click', () => undoLastStroke(currentPage));
document.getElementById('btnClear').addEventListener('click', () => clearPage(currentPage));

// ──────────── EXPORT ────────────
document.getElementById('btnSave').addEventListener('click', async () => {
  const hasAnnotations = Object.values(pageAnnotations).some(a => a.length > 0);
  if (!hasAnnotations) {
    toast('没有标注可导出，请先手写标注');
    return;
  }

  toast('正在准备导出…');

  // First, ensure all annotated pages are rendered
  const pagesToExport = [];
  for (let i = 1; i <= totalPages; i++) {
    if (pageAnnotations[i] && pageAnnotations[i].length > 0) {
      pagesToExport.push(i);
    }
  }

  // Render any unrendered pages that have annotations
  for (const pageNum of pagesToExport) {
    if (!renderedPages.has(pageNum)) {
      $progress.textContent = `正在渲染第 ${pageNum} 页…`;
      $loading.classList.add('show');
      await renderSinglePage(pageNum);
    }
  }
  $loading.classList.remove('show');

  // Export each annotated page
  for (const pageNum of pagesToExport) {
    const wrapper = document.getElementById('page-' + pageNum);
    if (!wrapper) continue;
    const pdfCanvas = wrapper.querySelector('canvas:not(.draw-canvas)');
    const drawCanvas = drawCanvases[pageNum];
    if (!pdfCanvas || !drawCanvas) continue;

    const merged = document.createElement('canvas');
    merged.width = pdfCanvas.width;
    merged.height = pdfCanvas.height;
    const mCtx = merged.getContext('2d');
    mCtx.drawImage(pdfCanvas, 0, 0);
    mCtx.drawImage(drawCanvas, 0, 0);

    const link = document.createElement('a');
    link.download = `标点符号0624_第${pageNum}页.png`;
    link.href = merged.toDataURL('image/png');
    link.click();
    await new Promise(r => setTimeout(r, 250));
  }

  toast(`导出完成！共 ${pagesToExport.length} 页`);
});

// ──────────── AUTO-LOAD ────────────
async function tryAutoLoad() {
  const pdfPath = '标点符号0624.pdf';
  try {
    const resp = await fetch(pdfPath, { method: 'HEAD' });
    if (resp.ok) {
      $progress.textContent = '正在自动加载 PDF…';
      $dropZone.style.display = 'none';
      $loading.classList.add('show');
      const fullResp = await fetch(pdfPath);
      const arrayBuffer = await fullResp.arrayBuffer();
      const blob = new Blob([arrayBuffer], { type: 'application/pdf' });
      await loadPDF(blob);
    }
  } catch (e) {
    // Auto-load failed — user can use file picker
    console.log('自动加载未成功，请手动选择 PDF 文件');
  }
}
