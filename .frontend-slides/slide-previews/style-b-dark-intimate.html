<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Style B — Dark Intimate</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #000;
  }
  .viewport {
    width: 100vw; height: 100vh;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .stage {
    width: 1920px; height: 1080px;
    position: relative;
    transform-origin: center center;
    background: #0d1117;
    overflow: hidden;
  }

  .slide {
    position: absolute; inset: 0;
    visibility: visible; opacity: 1; pointer-events: auto;
    display: flex; align-items: center; justify-content: center;
  }

  /* === LIGHTING ATMOSPHERE === */
  .stage::before {
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 1200px 700px at 35% 50%, rgba(212, 175, 55, 0.06) 0%, transparent 70%),
      radial-gradient(ellipse 800px 500px at 65% 35%, rgba(212, 175, 55, 0.04) 0%, transparent 60%),
      radial-gradient(circle 400px at 40% 60%, rgba(212, 175, 55, 0.08) 0%, transparent 100%);
    z-index: 0;
  }

  /* === SPOTLIGHT BEAM === */
  .spotlight {
    position: absolute;
    top: -200px; left: 50%;
    transform: translateX(-50%);
    width: 1400px; height: 600px;
    background: radial-gradient(ellipse at 50% 100%, rgba(212, 175, 55, 0.04) 0%, transparent 70%);
    z-index: 0;
    animation: beamPulse 6s ease-in-out infinite;
  }
  @keyframes beamPulse {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
  }

  /* === DECORATIVE ARC === */
  .arc {
    position: absolute;
    top: 120px; left: 50%; transform: translateX(-50%);
    width: 800px; height: 400px;
    border: 1px solid rgba(212, 175, 55, 0.12);
    border-radius: 50% 50% 0 0 / 100% 100% 0 0;
    border-bottom: none;
    z-index: 1;
  }

  /* === CONTENT === */
  .slide-content {
    position: relative; z-index: 3;
    text-align: center;
    max-width: 1300px;
    padding: 0 100px;
  }

  .kicker {
    font-family: 'DM Sans', 'Segoe UI', sans-serif;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: rgba(212, 175, 55, 0.7);
    margin-bottom: 70px;
  }

  .title {
    font-family: 'Playfair Display', 'Georgia', serif;
    font-size: 130px;
    font-weight: 400;
    line-height: 1.05;
    color: #e8e0d0;
    letter-spacing: -0.005em;
    margin-bottom: 55px;
  }

  .title .gold {
    color: #d4af37;
    font-style: italic;
  }

  .divider {
    width: 80px; height: 1px;
    background: rgba(212, 175, 55, 0.4);
    margin: 0 auto 55px;
  }

  .subtitle {
    font-family: 'DM Sans', 'Segoe UI', sans-serif;
    font-size: 24px;
    font-weight: 300;
    line-height: 1.6;
    color: rgba(232, 224, 208, 0.6);
    max-width: 650px;
    margin: 0 auto;
  }

  .page-num {
    position: absolute;
    bottom: 60px; right: 100px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: rgba(212, 175, 55, 0.4);
    letter-spacing: 0.2em;
  }

  /* === AMBIENT PARTICLES === */
  .particle {
    position: absolute;
    width: 2px; height: 2px;
    background: rgba(212, 175, 55, 0.25);
    border-radius: 50%;
    z-index: 0;
    animation: float 8s ease-in-out infinite;
  }
  .particle:nth-child(1) { top: 20%; left: 15%; animation-delay: 0s; }
  .particle:nth-child(2) { top: 30%; right: 20%; animation-delay: 1.5s; }
  .particle:nth-child(3) { top: 70%; left: 25%; animation-delay: 3s; }
  .particle:nth-child(4) { top: 65%; right: 18%; animation-delay: 4.5s; }
  .particle:nth-child(5) { top: 45%; left: 10%; animation-delay: 6s; }

  @keyframes float {
    0%, 100% { transform: translateY(0) scale(1); opacity: 0.2; }
    50% { transform: translateY(-20px) scale(1.5); opacity: 0.5; }
  }

  /* === TEXT REVEAL === */
  .reveal {
    opacity: 0;
    animation: fadeUp 1s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
  }
  .reveal:nth-child(1) { animation-delay: 0.15s; }
  .reveal:nth-child(2) { animation-delay: 0.4s; }
  .reveal:nth-child(3) { animation-delay: 0.55s; }
  .reveal:nth-child(4) { animation-delay: 0.7s; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(35px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (prefers-reduced-motion: reduce) {
    .reveal { animation: none; opacity: 1; }
    .spotlight, .particle { animation: none; }
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
<div class="viewport">
  <div class="stage" id="stage">
    <div class="slide active">
      <div class="spotlight"></div>
      <div class="arc"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>

      <div class="slide-content">
        <div class="kicker reveal">On Vulnerability &amp; Courage</div>
        <div class="title reveal">The Fear of<br><span class="gold">Being Seen</span></div>
        <div class="divider reveal"></div>
        <div class="subtitle reveal">Taking off the mask and letting ourselves<br>be truly known.</div>
      </div>
      <div class="page-num">01</div>
    </div>
  </div>
</div>

<script>
  const stage = document.getElementById('stage');
  function resize() {
    const scale = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
    stage.style.transform = `scale(${scale})`;
  }
  window.addEventListener('resize', resize);
  resize();
</script>
</body>
</html>
