<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Style A — Swiss Editorial</title>
<style>
  /* === RESET === */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  /* === VIEWPORT === */
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #1a1a1a;
    font-family: 'Crimson Text', Georgia, 'Times New Roman', serif;
  }
  .viewport {
    width: 100vw; height: 100vh;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .stage {
    width: 1920px; height: 1080px;
    position: relative;
    transform-origin: center center;
    background: #faf7f2;
    overflow: hidden;
  }

  /* === SLIDE === */
  .slide {
    position: absolute; inset: 0;
    visibility: visible; opacity: 1; pointer-events: auto;
    display: flex; align-items: center; justify-content: center;
  }

  /* === BACKGROUND TEXTURE === */
  .bg-texture {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse at 30% 20%, rgba(210,160,120,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 70% 80%, rgba(180,140,100,0.06) 0%, transparent 60%),
      linear-gradient(180deg, #faf7f2 0%, #f5f0e8 100%);
  }

  /* === DECORATIVE LINE === */
  .accent-line {
    position: absolute;
    top: 0; left: 120px;
    width: 3px; height: 100%;
    background: linear-gradient(180deg,
      transparent 0%,
      #c4956a 15%,
      #c4956a 85%,
      transparent 100%);
    opacity: 0.6;
  }

  /* === CONTENT === */
  .slide-content {
    position: relative; z-index: 2;
    text-align: left;
    max-width: 1300px;
    padding: 0 200px 0 200px;
  }

  .label {
    font-family: 'Inter', 'Segoe UI', sans-serif;
    font-size: 18px;
    font-weight: 500;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: #c4956a;
    margin-bottom: 60px;
  }

  .title {
    font-family: 'Cormorant Garamond', 'Georgia', serif;
    font-size: 120px;
    font-weight: 300;
    line-height: 1.08;
    color: #2c2416;
    letter-spacing: -0.01em;
    margin-bottom: 50px;
  }

  .title em {
    font-style: italic;
    color: #c4956a;
  }

  .subtitle {
    font-family: 'Inter', 'Segoe UI', sans-serif;
    font-size: 26px;
    font-weight: 300;
    line-height: 1.5;
    color: #6b5e4f;
    max-width: 700px;
  }

  /* === PAGE INDICATOR === */
  .page-num {
    position: absolute;
    bottom: 60px; right: 120px;
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    color: #c4956a;
    letter-spacing: 0.15em;
  }

  /* === ANIMATION === */
  .reveal {
    opacity: 0;
    animation: fadeUp 0.9s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
  }
  .reveal:nth-child(1) { animation-delay: 0.1s; }
  .reveal:nth-child(2) { animation-delay: 0.35s; }
  .reveal:nth-child(3) { animation-delay: 0.6s; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (prefers-reduced-motion: reduce) {
    .reveal { animation: none; opacity: 1; }
  }

  /* === RESPONSIVE SCALING === */
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400;500&display=swap');
</style>
</head>
<body>
<div class="viewport">
  <div class="stage" id="stage">
    <div class="slide active">
      <div class="bg-texture"></div>
      <div class="accent-line"></div>
      <div class="slide-content">
        <div class="label reveal">A Personal Reflection</div>
        <div class="title reveal">The Fear of<br><em>Being Seen</em></div>
        <div class="subtitle reveal">Why we wear masks, hide our struggles,<br>and how vulnerability can set us free.</div>
      </div>
      <div class="page-num">01</div>
    </div>
  </div>
</div>

<script>
  /* === STAGE SCALING === */
  const stage = document.getElementById('stage');
  function resize() {
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const scaleX = vw / 1920;
    const scaleY = vh / 1080;
    const scale = Math.min(scaleX, scaleY);
    stage.style.transform = `scale(${scale})`;
  }
  window.addEventListener('resize', resize);
  resize();
</script>
</body>
</html>
