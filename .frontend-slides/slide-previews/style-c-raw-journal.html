<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Style C — Raw Journal</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #1c1c1c;
  }
  .viewport {
    width: 100vw; height: 100vh;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .stage {
    width: 1920px; height: 1080px;
    position: relative;
    transform-origin: center center;
    background: #f3eee4;
    overflow: hidden;
  }

  .slide {
    position: absolute; inset: 0;
    visibility: visible; opacity: 1; pointer-events: auto;
    display: flex; align-items: center; justify-content: center;
  }

  /* === PAPER TEXTURE === */
  .stage::before {
    content: '';
    position: absolute; inset: 0;
    background:
      repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(139,119,90,0.02) 2px, rgba(139,119,90,0.02) 4px),
      radial-gradient(ellipse at 50% 50%, rgba(255,255,255,0.4) 0%, transparent 100%),
      linear-gradient(180deg, #f3eee4 0%, #efe8da 50%, #f3eee4 100%);
    z-index: 0;
  }

  /* === TORN EDGE EFFECT — LEFT === */
  .torn-edge {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 8px;
    background: linear-gradient(180deg,
      #e8dcc8 0%, #f3eee4 8%, #e5d9c5 15%, #f3eee4 22%,
      #e9ddca 30%, #f3eee4 38%, #e6dac7 45%, #f3eee4 52%,
      #e8dcc8 60%, #f3eee4 68%, #e5d9c5 75%, #f3eee4 82%,
      #e9ddca 90%, #f3eee4 100%);
    z-index: 2;
  }

  /* === RED THREAD === */
  .red-thread {
    position: absolute;
    top: -30px; left: 140px;
    width: 1.5px; height: 1140px;
    background: linear-gradient(180deg,
      transparent 0%,
      #c7553a 5%,
      #c7553a 95%,
      transparent 100%);
    z-index: 1;
    transform: rotate(0.5deg);
    opacity: 0.5;
  }

  .red-thread::after {
    content: '';
    position: absolute;
    bottom: 0; left: -3px;
    width: 8px; height: 50px;
    background: #c7553a;
    border-radius: 2px;
    opacity: 0.6;
    /* loose thread end */
    transform: rotate(8deg);
    transform-origin: top center;
  }

  /* === TAPE MARK === */
  .tape {
    position: absolute;
    top: 180px; left: 137px;
    width: 60px; height: 28px;
    background: rgba(220, 210, 190, 0.5);
    border: 1px solid rgba(180, 160, 130, 0.2);
    transform: rotate(-2deg);
    z-index: 3;
  }

  /* === CONTENT === */
  .slide-content {
    position: relative; z-index: 4;
    text-align: left;
    max-width: 1200px;
    padding: 0 120px 0 280px;
  }

  .stamp {
    font-family: 'JetBrains Mono', 'Courier New', monospace;
    font-size: 14px;
    font-weight: 400;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #8b775a;
    border: 1.5px solid #8b775a;
    display: inline-block;
    padding: 10px 24px;
    margin-bottom: 55px;
    opacity: 0.7;
  }

  .title {
    font-family: 'Newsreader', 'Georgia', serif;
    font-size: 115px;
    font-weight: 350;
    line-height: 1.1;
    color: #2c2416;
    letter-spacing: -0.015em;
    margin-bottom: 40px;
  }

  .title mark {
    background: transparent;
    color: #c7553a;
    font-style: italic;
    position: relative;
  }

  .title mark::after {
    content: '';
    position: absolute;
    bottom: 4px; left: -4px; right: -4px;
    height: 6px;
    background: rgba(199, 85, 58, 0.1);
    border-radius: 2px;
  }

  .slashes {
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px;
    color: #8b775a;
    letter-spacing: 0.4em;
    margin-bottom: 40px;
    opacity: 0.5;
  }

  .subtitle {
    font-family: 'Newsreader', 'Georgia', serif;
    font-size: 26px;
    font-weight: 350;
    font-style: italic;
    line-height: 1.6;
    color: #6b5e4f;
    max-width: 650px;
  }

  .page-num {
    position: absolute;
    bottom: 55px; right: 100px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    color: #8b775a;
    opacity: 0.5;
  }

  /* === ANIMATION === */
  .reveal {
    opacity: 0;
    animation: fadeUp 0.8s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
  }
  .reveal:nth-child(1) { animation-delay: 0.1s; }
  .reveal:nth-child(2) { animation-delay: 0.3s; }
  .reveal:nth-child(3) { animation-delay: 0.45s; }
  .reveal:nth-child(4) { animation-delay: 0.6s; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(25px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (prefers-reduced-motion: reduce) {
    .reveal { animation: none; opacity: 1; }
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;1,6..72,300;1,6..72,400&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
</head>
<body>
<div class="viewport">
  <div class="stage" id="stage">
    <div class="slide active">
      <div class="torn-edge"></div>
      <div class="red-thread"></div>
      <div class="tape"></div>

      <div class="slide-content">
        <div class="stamp reveal">A Personal Essay</div>
        <div class="title reveal">The Fear of<br><mark>Being Seen</mark></div>
        <div class="slashes reveal">///</div>
        <div class="subtitle reveal">On masks, imposter syndrome,<br>and the courage to show up as we are.</div>
      </div>
      <div class="page-num">page 1</div>
    </div>
  </div>
</div>

<script>
  const stage = document.getElementById('stage');
  function resize() {
    const scale = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
    stage.style.transform = `scale(${scale})`;
  }
  window.addEventListener('resize', resize);
  resize();
</script>
</body>
</html>
